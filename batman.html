<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batman Logo Buffering</title>
    <style>
        body {
            position: relative;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f0f0f0;
        }

        .fullscreen-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background-color: rgba(255, 255, 255, 0.4);
            pointer-events: none;
        }

        .loader-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: all;
        }

        .static-loader {
            width: 100px;
            height: 45px;
            position: relative;
        }

        .static-loader:before,
        .static-loader:after {
            content: "";
            position: absolute;
            inset: 0;
            background: #000;
            box-shadow: 0 0 0 50px #000;
            clip-path: polygon(-50px -20px,10% -12px,20% 0,calc(50% - 15px) 0,calc(50% - 10px) -20px,calc(50% - 8px) -15px,calc(50% + 8px) -15px,calc(50% + 10px) -20px,calc(50% + 15px) 0,80% 0,90% -12px,calc(100% + 50px) -20px,100% 80%,calc(100% + 10px) calc(100% + 10px),60% 100%,50% calc(100% + 15px),40% 100%,-10px calc(100% + 10px),0 80%);
        }

        .static-loader.loader:after {
            animation: l9 1s infinite;
            transform: perspective(300px) translateZ(0px);
        }

        @keyframes l9 {
            to {
                transform: perspective(300px) translateZ(100px);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="fullscreen-container" id="loaderContainer">
        <div class="loader-wrapper">
            <div class="static-loader loader"></div>
        </div>
    </div>

    <script>
        // Add loader class when page loads to start animation
        window.addEventListener('load', function() {
            document.querySelector('.static-loader').classList.add('loader');
        });
    </script>
</body>
</html>
